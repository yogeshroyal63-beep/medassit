# MedAssist Nginx reverse proxy
# Terminates TLS, enforces HTTPS, and proxies to the Node backend.
#
# To enable TLS:
#   1. Obtain certs with certbot:
#        certbot certonly --standalone -d yourdomain.com
#   2. Set SSL_CERT_PATH and SSL_KEY_PATH in docker-compose.yml (or use volumes)
#   3. Uncomment the HTTPS server block and the redirect below.

# ─── HTTP → HTTPS redirect ─────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    # Redirect all HTTP traffic to HTTPS.
    # Comment this out and use the direct proxy below only in local dev.
    return 301 https://$host$request_uri;

    # ── LOCAL DEV ONLY: uncomment the block below and remove the return 301 ──
    # location / {
    #     proxy_pass         http://backend:5001;
    #     proxy_http_version 1.1;
    #     proxy_set_header   Upgrade $http_upgrade;
    #     proxy_set_header   Connection "upgrade";
    #     proxy_set_header   Host              $host;
    #     proxy_set_header   X-Real-IP         $remote_addr;
    #     proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    #     proxy_set_header   X-Forwarded-Proto $scheme;
    # }
}

# ─── HTTPS ─────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name _;

    # Replace with your certificate paths (e.g. Let's Encrypt / certbot paths)
    ssl_certificate     /etc/ssl/certs/medassist.crt;
    ssl_certificate_key /etc/ssl/private/medassist.key;

    # Modern TLS settings (TLS 1.2+ only)
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;

    # HSTS — tells browsers to only use HTTPS for 1 year
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Serve the React SPA build
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — all routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the Node backend
    location /api/ {
        proxy_pass         http://backend:5001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Proxy WebSocket (Socket.io) to backend
    location /socket.io/ {
        proxy_pass         http://backend:5001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
