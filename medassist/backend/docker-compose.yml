# Local development docker-compose for the backend + its dependencies only.
# For full-stack (frontend + nginx + AI service), use the root docker-compose.yml.

version: '3.8'

services:
  mongo:
    image: mongo:7
    ports:
      - "127.0.0.1:27017:27017"   # bound to localhost only — not exposed publicly
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  ai-service:
    build: ../ai_service
    # Port intentionally bound to localhost only — the backend is the only caller.
    # Do NOT expose 0.0.0.0:8000 in production.
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - PYTHONPATH=/app
      - BACKEND_URL=http://backend:5001
      - AI_SERVICE_SECRET=${AI_SERVICE_SECRET}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  backend:
    build: .
    ports:
      - "5001:5001"
    environment:
      - NODE_ENV=development
      - PORT=5001
      - MONGO_URI=mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongo:27017/medassist?authSource=admin
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - ACCESS_TOKEN_TTL=${ACCESS_TOKEN_TTL:-15m}
      - REFRESH_TOKEN_TTL=${REFRESH_TOKEN_TTL:-7d}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - AI_SERVICE_URL=http://ai-service:8000
      - AI_SERVICE_SECRET=${AI_SERVICE_SECRET}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
      # Redis — optional: enables shared rate-limiting + persistent token blacklist
      - REDIS_URL=${REDIS_URL:-}
      # Auth0 — leave blank to disable social login
      - AUTH0_DOMAIN=${AUTH0_DOMAIN:-}
      - AUTH0_AUDIENCE=${AUTH0_AUDIENCE:-}
      - AUTH0_CLIENT_ID=${AUTH0_CLIENT_ID:-}
      - AUTH0_CLIENT_SECRET=${AUTH0_CLIENT_SECRET:-}
    depends_on:
      mongo:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  mongo_data:
